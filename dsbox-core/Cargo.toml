[package]
name = "dsbox-core"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4.21"
libproto = { path = "../libproto", features = ["system_messages"] }
serde = "1"
serde_json = "1"
tokio = { version = "1.37.0", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
shlex = "1.3.0"
regex = "1.11.3"

mlua = { version = "0.11.4", features = ["lua54", "async", "serialize", "vendored"], optional = true }

wasmtime = { version = "37.0.1", optional = true }
wasmtime-wasi = { version = "37.0.1", optional = true }
wasi-common = { version = "37.0.1", features = ["tokio"], optional = true }
wiggle = { version = "37.0.1", optional = true }

[features]
lua = ["dep:mlua"]
wasm = ["dep:wasmtime", "dep:wasmtime-wasi", "dep:wasi-common", "dep:wiggle"]
default = ["lua", "wasm"]