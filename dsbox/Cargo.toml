[package]
name = "dsbox"
version = "0.1.0"
edition = "2021"
build = "build/build.rs"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
clap = { version = "4.3.5", features = ["derive"] }

libproto = { path = "../libproto", features = ["system_messages"] }

serde = "1"
serde_json = "1"

log = "0.4.17"
simple_logger = "4.1.0"

crossbeam-channel = "0.5.8"

tokio = { version = "1.28.0", features = ["full"] }
tokio-stream = "0.1.14"
async-channel = "1.8.0"
futures = "0.3.28"

axum = { version = "0.6.18", features = ["ws"] }
#rust-embed = { version = "6.7.0", features = ["mime-guess", "interpolate-folder-path", "include-exclude"] }
phf = { version = "0.11.1", default-features = false }
flate2 = "1.0.26"
globset = "0.4.10"
mime_guess = "2.0.4"

regex = "1.8.4"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8.5"

wasmtime = { version = "9" }
wasmtime-wasi = { version = "9" }
wasi-common = { version = "9" }
wiggle = { version = "9" }

[build-dependencies]
phf_codegen = "0.11.1"
flate2 = "1.0.26"
globset = "0.4.10"
mime_guess = "2.0.4"