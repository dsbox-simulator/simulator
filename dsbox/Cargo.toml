[package]
name = "dsbox"
version = "0.1.0"
edition = "2021"
build = "build/build.rs"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
clap = { version = "4.5.4", features = ["derive"] }

libproto = { path = "../libproto", features = ["system_messages"] }

serde = "1"
serde_json = "1"

log = "0.4.21"
simple_logger = "4.3.3"

shlex = "1.3.0"

tokio = { version = "1.37.0", features = ["full"] }

axum = { version = "0.7.5", features = ["ws"] }
phf = { version = "0.11.2", default-features = false }
flate2 = "1.0.28"
mime_guess = "2.0.4"

regex = "1.10.4"
chrono = { version = "0.4", features = ["serde"] }

wasmtime = { version = "20" }
wasmtime-wasi = { version = "20" }
wasi-common = { version = "20", features = ["tokio"] }
wiggle = { version = "20" }

[build-dependencies]
phf_codegen = "0.11.2"
flate2 = "1.0.28"
mime_guess = "2.0.4"