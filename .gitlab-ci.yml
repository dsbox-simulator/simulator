# Official language image. Look for the different tagged releases at:
# https://hub.docker.com/r/library/rust/tags/
image: "rust:latest"

stages:
  - setup
  - build:webapp
  - build:app

setup:
  stage: setup
  script:
    # check docker is working
    - docker info
    # install musl so that we can build a statically linked libc (for greater portability)
    - apt-get update -yqq
    - apt-get install -yqq --no-install-recommends curl
    - apt-get install -yqq musl-dev musl-tools
    # Install Node Version Manager (NVM)
    - curl -o- curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
    - ". ~/.nvm/nvm.sh"
    - nvm --version
    - nvm install v22.0.0
    - nvm use v22.0.0
    # install angular cli for building the webapp
    - npm install -g @angular/cli
    # install the cross compiler tool
    - cargo install cross
    # install the used targets
    - rustup target add x86_64-pc-windows-gnu
    - rustup target add x86_64-unknown-linux-musl

build:webapp:
  stage: build:webapp
  script:
    - cd webapp
    - npm install
    - ng build --configuration production

build:linux:
  stage: build:app
  variables:
    RUSTFLAGS: "-C link-arg=-s"
  script: cross build --target x86_64-unknown-linux-musl --package dsbox --release --features embedded_webapp
  artifacts:
    when: on_success
    paths:
      - target/x86_64-unknown-linux-musl/release/dsbox
    expire_in: 1 week

build:windows:
  stage: build:app
  script: cross build --target x86_64-pc-windows-gnu --package dsbox --release --features embedded_webapp
  artifacts:
    when: on_success
    paths:
      - target/x86_64-pc-windows-gnu/release/dsbox
    expire_in: 1 week