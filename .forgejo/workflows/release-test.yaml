on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: docker
    container:
      image: node:lts-bookworm
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v5
      - name: Install rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Install apt dependencies
        run: |
          apt-get update -y
          apt-get install clang lld llvm libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev librsvg2-dev -y
      - name: Install rust targets and tools
        run: |
          . $HOME/.cargo/env
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli
      - name: Install webapp packages
        working-directory: webapp
        run: |
          npm install
      - name: Build DsBox Linux
        run: |
          . $HOME/.cargo/env
          cargo tauri build --bundles deb,rpm
      - name: Prepare release files
        run: |
          mkdir /tmp/release
          tar -zcf /tmp/release/x86_64-linux.tar.gz -C target/release/ dsbox
          cp target/release/bundle/deb/DsBox_*_amd64.deb /tmp/release
          cp target/release/bundle/rpm/DsBox-*-1.x86_64.rpm /tmp/release
      - name: Upload artifacts
        uses: forgejo/upload-artifact@v4
        with:
          name: artifact-linux
          path: /tmp/release/*


  build-windows:
    runs-on: docker
    container:
      image: node:lts-bookworm
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v5
      - name: Install rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Install apt dependencies
        run: |
          apt-get update -y
          apt-get install clang lld llvm libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev librsvg2-dev -y
      - name: Install rust targets and tools
        run: |
          . $HOME/.cargo/env
          rustup target add x86_64-pc-windows-msvc
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cargo-xwin
          cargo binstall tauri-cli
      - name: Install webapp packages
        working-directory: webapp
        run: |
          npm install
      - name: Build DsBox Windows
        run: |
          . $HOME/.cargo/env
          cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --no-bundle
      - name: Prepare release files
        run: |
          mkdir /tmp/release
          tar -zcf /tmp/release/x86_64-windows.tar.gz -C target/x86_64-pc-windows-msvc/release/ dsbox.exe
      - name: Upload artifacts
        uses: forgejo/upload-artifact@v4
        with:
          name: artifact-windows
          path: /tmp/release/*

  release:
    runs-on: docker
    container:
      image: node:lts-bookworm
    needs: ["build-linux", "build-windows"]
    steps:
      - name: Download artifacts
        uses: forgejo/download-artifact@v4
        with:
          path: /tmp/release
          merge-multiple: true
      - name: Upload Release
        run: |
          ls -al /tmp/release
