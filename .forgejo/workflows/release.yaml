on:
  push:
    tags:
      - "*"
jobs:
  build-and-release:
    runs-on: docker
    container:
      image: node:lts-bookworm
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v5
      - name: Install rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Install apt dependencies
        run : |
          apt-get update -y
          apt-get install clang lld llvm libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev librsvg2-dev -y
      - name: Install rust targets and tools
        run: |
          . $HOME/.cargo/env
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-xwin --version 0.19.2
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri
      - name: Install webapp packages
        working-directory: webapp
        run: |
          npm install
      - name: Build DsBox Linux
        run: |
          . $HOME/.cargo/env
          cargo tauri build --features wasm --bundles deb,rpm
      - name: Build DsBox Windows
        run: |
          . $HOME/.cargo/env
          cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --features wasm --no-bundle
      - name: Prepare release files
        run: |
          mkdir /tmp/release
          tar -zcf /tmp/release/x86_64-linux.tar.gz -C target/release/ dsbox
          cp target/release/bundle/deb/DsBox_*_amd64.deb /tmp/release
          cp target/release/bundle/rpm/DsBox-*-1.x86_64.rpm /tmp/release
          tar -zcf /tmp/release/x86_64-windows.tar.gz -C target/x86_64-pc-windows-msvc/release/ dsbox.exe
      - name: Publish Packages
        run: |
          curl --user ${{ vars.REGISTRY_USERNAME }}:${{ secrets.REGISTRY_TOKEN }} \
            --upload-file /tmp/release/*.deb \
            ${{ forgejo.server_url }}/api/packages/${{ forgejo.repository_owner }}/debian/pool/bookworm/main/upload
           curl --user ${{ vars.REGISTRY_USERNAME }}:${{ secrets.REGISTRY_TOKEN }} \
            --upload-file /tmp/release/*.rpm \
            ${{ forgejo.server_url }}/api/packages/${{ forgejo.repository_owner }}/rpm/upload
      - name: Upload release
        uses: actions/forgejo-release@v2.7.3
        with:
          release-notes: |
            For fedora (rpm) based distributions, download `DsBox-<version>-1.x86_64.rpm` and install with 
            ```sh
            sudo dnf install ./DsBox-<version>-1.x86_64.rpm
            ```
            
            For debian/ubuntu (deb) based distributions download `DsBox_<version>_amd64.deb` and install with
            ```sh
            sudo apt-get update
            sudo apt-get install ./DsBox_<version>_amd64.deb
            ```
            
            For windows, download `x86_64-windows.tar.gz` and extract `dsbox.exe`
            
            To verify the simulator is installed run 
            ```sh
            dsbox --help
            ```
            or (on windows)
            ```
            <path>\<to>\dsbox.exe --help
            ```
          direction: upload
          release-dir: /tmp/release
