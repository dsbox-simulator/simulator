<div style="margin-top: 100px;">

    
    <div class="text-center">
      <div id="myTabContent" class="tab-content">
        <div
          class="tab-pane fade tab-container"
          [class.active]="activeTab === 'home'"
          [class.show]="activeTab === 'home'"
          id="home"
          role="tabpanel"
        >

          <div class="container-fluid">
            <div class="row">
              <div class="col-12">
                <app-graph></app-graph>
              </div>
            </div>
            <div class="row">
              <div class="col-8">
                <app-event-table [delivered]="true"></app-event-table>
              </div>
              <div class="col-4">
                <app-graph-in-transit></app-graph-in-transit>
              </div>
            </div>
          </div>
        </div>
        <div
          class="tab-pane fade"
          [class.active]="activeTab === 'Messages'"
          [class.show]="activeTab === 'Messages'"
          id="Messages"
          role="tabpanel"
        >        
            <app-event-table [delivered]="false"></app-event-table> 
        </div>   
        <div
        class="tab-pane fade"
        [class.active]="activeTab === 'Logs'"
        [class.show]="activeTab === 'Logs'"
        id="Logs"
        role="tabpanel"
      >        
      
      </div>       
      </div>
    </div>
