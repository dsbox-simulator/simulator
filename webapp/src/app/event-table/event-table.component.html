<div>
  <div class="form-group">
    <input type="search" class="form-control" [(ngModel)]="filter" placeholder="Filter Messages">
  </div>

  <table class="table table-hover d-block w-100 overflow-auto">
    <thead>
      <tr>
        <th scope="col">Timestamp</th>
        <th scope="col">Type</th>
        <th scope="col">Source</th>
        <th scope="col">Destination</th>
        <th scope="col">Body</th>
        <th>Copy JSON</th>
        <th *ngIf="delivered">Deliver Message</th>
        <th *ngIf="delivered">Drop Message</th>
      </tr>
    </thead>
    <tbody>
      <tr class="table-active" *ngFor="let event of events | event:filter">
        <td>{{ event.params.timestamp.logical }}</td>
        <td>{{ event.params.data?.type }}</td>
        <td *ngIf="event.params.data && event.params.data.type === 'send_message'; else elseSrc">{{event.params.data.msg!.src}}</td>
        <td *ngIf="event.params.data && event.params.data.type === 'send_message'; else elseDest">{{event.params.data.msg!.dest}}</td>
        <td *ngIf="event.params.data && event.params.data.type === 'send_message'; else elseBody"
            (click)="toggleFormat(event.params.timestamp.logical)"
            [style.white-space]="'pre-wrap'"
            [style.text-align]="'left'"
            [innerHTML]="isFormatted(event.params.timestamp.logical) ? (event.params.data.msg!.body | json | highlightJson) : (event.params.data.msg!.body | highlightJson)">
        </td>

        <ng-template #elseSrc>
          <td>-</td>
        </ng-template>
        <ng-template #elseDest>
          <td>-</td>
        </ng-template>
        <ng-template #elseBody>
          <td (click)="toggleFormat(event.params.timestamp.logical)"
              [style.white-space]="'pre-wrap'"
              [style.text-align]="'left'"
              [innerHTML]="isFormatted(event.params.timestamp.logical) ? (event.params.data | json | highlightJson) : (event.params.data | highlightJson)">
          </td>
        </ng-template>

        <!-- Copy button -->
        <td>
          <button (click)="copyToClipboard(event)" class="btn btn-secondary">Copy</button>
        </td>

        <td *ngIf="delivered"><button (click)="deliverEvent(event)" class="btn btn-primary">Deliver</button></td>
        <td *ngIf="delivered"><button (click)="dropEvent(event)" class="btn btn-primary">Drop</button></td>
      </tr>
    </tbody>
  </table>
</div>
